# 第三方 tpapi：登录 + 查设备均走 third-party-api（见 apiMode）
# 联调测试：账号 szjsdx（见 docs/第三方对接接口.docx）；仅能查该账号绑定设备
# 正式上线：须向云平台注册并申请专用机机账号
baseUrl: "https://sztu.lingubot.cn/third-party-api"
mock: false
timeoutMs: 10000
tenantId: "1"
enrichTaskFromList: false
positionMode: "map_xy"
apiMode: "tpapi"
statusQueryMode: "batch"
statusBatchPath: "/tpapi/device/get_device_detail_list"
tpapiDeviceDetailListPath: "/tpapi/device/get_device_detail_list"
tpapiSetTaskPointPath: "/tpapi/device/set_device_task_point"
tpapiGetTaskPointPath: "/tpapi/device/get_device_task_point"
auth:
  type: "tpapi_login"
  tpapiBaseUrl: "https://sztu.lingubot.cn/third-party-api"
  publicKeyId: "${CLOUD_TPAPI_ID}"
  publicKeyPath: "/tpapi/auth/public_key"
  tpapiLoginPath: "/tpapi/auth/login"
  username: "${CLOUD_USERNAME}"
  password: "${CLOUD_PASSWORD}"
